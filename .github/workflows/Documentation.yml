name: Documenter

on:
  push:
    branches:
      - master
    tags: ['*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - name: Load Julia packages from cache
        id: julia-cache
        uses: julia-actions/cache@v3
      # docs/make.jl builds the host libmx (deps/build.jl) before `using Unmex`,
      # using the C compiler on the runner. DOCUMENTER_KEY enables gh-pages deploy.
      - name: Build and deploy docs
        uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          JULIA_DEBUG: "Documenter"
